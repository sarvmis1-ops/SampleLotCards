<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sarv India Home Furnishing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body,html{overflow-x:hidden;width:100%;background-color:#f3f4f6;}
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-track{background:#f1f1f1;}
    ::-webkit-scrollbar-thumb{background:#3b82f6;border-radius:10px;}
    .signature-canvas{touch-action:none;user-select:none;}
    @keyframes pulse-sync{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(1.15);}}
    .pulse-sync-active{animation:pulse-sync 1.0s infinite;}
    .printable-pdf-page{width:794px;height:1123px;background-color:#ffffff;color:#000000;padding:30px;box-sizing:border-box;font-family:ui-sans-serif,system-ui,sans-serif;position:relative;}
  </style>
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-950">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzJILDaZ5gWzmD4WKisMrG3OND_0lpHjmJOCUHoGOkVWsN3y2U9CZ9wIK-9MmYA7WNx/exec";

// Role -> allowed fields map (mirrors Code.gs exactly)
const ROLE_FIELD_MAP = {
  WEAVING:["sampleNo","lotNo","quality","bedSize","blanketPly","reqBlanketPcsWeightWithoutEverything","raschelGuage","raschelPyleHeight","pcPoDenier","pcPoEnds","microDenier","microEnds","raschelRollWeight","pcsWeightRequired","raschelWidth","afterRaschelSize","raschelRollLength","totalNoOfRoll","sign_weavingRaschelMaster","sign_checkedRaschel"],
  SLITTING:["slittingSpeed","afterSlittingSize","afterSlittingMagnet","mendingCheck","sign_slittingRaschelMaster"],
  STENTER:["stenterYesNo","beforeStenterWidth","stenterTemp","topBlowerSpeed","bottomBlowerSpeed","stenterSpeed","afterStenterSize","sign_stenterMaster1","stenterSpeed2","stenterTemp2","topBlowerSpeed2","bottomBlowerSpeed2","afterStenterSize2","sign_stenterMaster2"],
  GREY_POLISH:["polishBeforeBrushingYesNo","polishSpeed","polishTemp","tableBrushingSpeed","highSpeedBrushingYesNo","highSpeedBrushingSpeed","afterHighSpeedBrushingSize","howManyPolishMachineUsed","howManyCylinderUsed","greyPolishSpeed","greyPolishTemp","afterGreyPolishSize","sign_greyPolishMaster","sign_checkedGreyPolish"],
  PRINTING:["printingDesignPhoto","printingChemical","printingRepeat","azerHoldingTime","afterAzerSize","washingChemical","washingTemp","washingSpeed","hydro","caustic","soaping","silicon1","silicon2","bouncing","afterWashingSize","dryerProcess","dryerSpeed","dryerTemp","afterDryerSize","sign_printingMaster","sign_checkedPrinting"],
  FINISHING:["finishPolishBeforeBrushingYesNo","finishPolishSpeed","finishPolishTemp","afterPolishSize","finishTableBrushingSpeed","afterBrushingSize","finishHighSpeedBrushingYesNo","finishHighSpeedBrushingSpeed","afterHighSpeedSize","raisingYesNo","howManyRaisingMachine","percentRaising","afterRaisingSize","howManyPolisherFinal","howManyPolycutFinal","polisherSpeedFinal","polisherTempFinal","afterFinalPolisherSize","embossYesNo","tempOfEmboss","holdingTimeOfEmboss","sign_finishingMaster","sign_checkedFinishing"],
  PACKING:["totalPcs","averagePcsLength","averagePcsWidth","avgPcsWeight","totalWasteWeight","label","sign_packingContractor"],
  QC_GM:["sign_checkedRaschel","sign_checkedGreyPolish","sign_checkedPrinting","sign_checkedFinishing","sign_checkedGM","sampleApprovedYesNo","sign_approvedMD"],
  ADMIN:"ALL"
};

const ROLE_LABELS = {WEAVING:"Raschel Master",SLITTING:"Slitting Master",STENTER:"Stenter Master",GREY_POLISH:"Grey Polish Master",PRINTING:"Printing Master",FINISHING:"Finishing Master",PACKING:"Packing Contractor",QC_GM:"GM / Quality Check",ADMIN:"Administrator"};
const ROLE_COLORS = {WEAVING:"bg-blue-700",SLITTING:"bg-indigo-700",STENTER:"bg-violet-700",GREY_POLISH:"bg-cyan-700",PRINTING:"bg-green-700",FINISHING:"bg-teal-700",PACKING:"bg-orange-700",QC_GM:"bg-red-700",ADMIN:"bg-gray-900"};

const initialFormState = {
  sampleNo:'',isSubmitted:false,pdfDriveUrl:'',
  raschelGuage:'',lotNo:'',raschelPyleHeight:'',pcPoDenier:'',pcPoEnds:'',
  microDenier:'',microEnds:'',raschelRollWeight:'',pcsWeightRequired:'',
  raschelWidth:'',afterRaschelSize:'',raschelRollLength:'',totalNoOfRoll:'',
  quality:'',bedSize:'DOUBLE',blanketPly:'SINGLE PLY',reqBlanketPcsWeightWithoutEverything:'',
  slittingSpeed:'',afterSlittingSize:'',afterSlittingMagnet:'',mendingCheck:'',
  stenterYesNo:'NO',beforeStenterWidth:'',stenterTemp:'',topBlowerSpeed:'',bottomBlowerSpeed:'',stenterSpeed:'',afterStenterSize:'',
  polishBeforeBrushingYesNo:'NO',polishSpeed:'',polishTemp:'',tableBrushingSpeed:'',
  highSpeedBrushingYesNo:'NO',highSpeedBrushingSpeed:'',afterHighSpeedBrushingSize:'',
  howManyPolishMachineUsed:'',howManyCylinderUsed:'',greyPolishSpeed:'',greyPolishTemp:'',afterGreyPolishSize:'',
  printingDesignPhoto:'',printingChemical:'',printingRepeat:'',azerHoldingTime:'',
  afterAzerSize:'',washingChemical:'',washingTemp:'',washingSpeed:'',hydro:'',
  caustic:'',soaping:'',silicon1:'',silicon2:'',bouncing:'',afterWashingSize:'',dryerProcess:'DRYER',
  stenterSpeed2:'',stenterTemp2:'',topBlowerSpeed2:'',bottomBlowerSpeed2:'',afterStenterSize2:'',
  dryerSpeed:'',dryerTemp:'',afterDryerSize:'',
  finishPolishBeforeBrushingYesNo:'NO',finishPolishSpeed:'',finishPolishTemp:'',
  afterPolishSize:'',finishTableBrushingSpeed:'',afterBrushingSize:'',
  finishHighSpeedBrushingYesNo:'NO',finishHighSpeedBrushingSpeed:'',afterHighSpeedSize:'',
  raisingYesNo:'NO',howManyRaisingMachine:'',percentRaising:'',afterRaisingSize:'',
  howManyPolisherFinal:'',howManyPolycutFinal:'',polisherSpeedFinal:'',polisherTempFinal:'',afterFinalPolisherSize:'',
  embossYesNo:'NO',tempOfEmboss:'',holdingTimeOfEmboss:'',
  totalPcs:'',averagePcsLength:'',averagePcsWidth:'',avgPcsWeight:'',totalWasteWeight:'',label:'',
  sign_weavingRaschelMaster:'',sign_slittingRaschelMaster:'',sign_stenterMaster1:'',
  sign_greyPolishMaster:'',sign_printingMaster:'',sign_stenterMaster2:'',
  sign_finishingMaster:'',sign_packingContractor:'',sign_checkedRaschel:'',
  sign_checkedGreyPolish:'',sign_checkedPrinting:'',sign_checkedFinishing:'',
  sign_checkedGM:'',sampleApprovedYesNo:'YES',sign_approvedMD:''
};

function canEditField(role,field){
  if(!role) return false;
  if(role==='ADMIN') return true;
  const a=ROLE_FIELD_MAP[role];
  if(!a) return false;
  return Array.isArray(a)?a.includes(field):false;
}

// ── Input Component ──────────────────────────────────────────────────────────
const Input=({label,type="text",value,onChange,onBlurSync,options,readOnly=false,noAccess=false,isSectionLocked=false})=>{
  const safeVal=value??'';
  const disabled=readOnly||noAccess||isSectionLocked;
  const cls=`w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-xs ${disabled?'bg-gray-100 text-gray-500 cursor-not-allowed font-semibold':'bg-white'}`;
  return(
    <div className="flex flex-col w-full">
      <label className="text-[10px] font-black text-gray-700 mb-0.5 uppercase tracking-wide flex items-center gap-1">
        {label}
        {isSectionLocked&&<span className="text-red-500 text-[9px]">🔒</span>}
        {noAccess&&!isSectionLocked&&<span className="text-amber-500 text-[9px]">🚫</span>}
      </label>
      {type==="select"?(
        <select value={safeVal} onChange={e=>{onChange(e.target.value);if(onBlurSync)onBlurSync();}} disabled={disabled} className={cls}>
          {options.map(o=><option key={o} value={o}>{o}</option>)}
        </select>
      ):(
        <input type={type} value={safeVal} onChange={e=>onChange(e.target.value)} onBlur={onBlurSync} disabled={disabled}
          placeholder={isSectionLocked?"Locked (Signed)":noAccess?"No access — different section":`Enter ${label}`}
          className={cls}/>
      )}
    </div>
  );
};

// ── Section Component ────────────────────────────────────────────────────────
const Section=({title,children,defaultOpen=false,isSectionLocked=false})=>{
  const [open,setOpen]=useState(defaultOpen);
  return(
    <div className={`mb-3 border rounded-xl shadow-sm overflow-hidden ${isSectionLocked?'border-red-200':'border-blue-200'}`}>
      <div className={`px-3.5 py-3 font-bold flex justify-between items-center cursor-pointer select-none active:scale-[0.99] ${isSectionLocked?'bg-gradient-to-r from-red-700 to-red-600 text-white':'bg-gradient-to-r from-blue-700 to-blue-600 text-white'}`}
        onClick={()=>setOpen(!open)}>
        <span className="text-xs font-extrabold uppercase flex items-center gap-1.5">
          {isSectionLocked&&<>🔒<span className="text-[10px] bg-red-800 px-1.5 py-0.5 rounded font-black">SIGNED & LOCKED</span></>} {title}
        </span>
        <span>{open?'▲':'▼'}</span>
      </div>
      {open&&<div className="p-3.5 space-y-3.5 bg-white">{children}</div>}
    </div>
  );
};

// ── Signature Pad Component ──────────────────────────────────────────────────
const SignaturePad=({title,value,onChange,onClearAttempt,noAccess=false,isSectionLocked=false})=>{
  const [isOpen,setIsOpen]=useState(false);
  const canvasRef=useRef(null);
  const [isDrawing,setIsDrawing]=useState(false);
  const lastPos=useRef({x:0,y:0});
  const rectCache=useRef(null);
  const locked=noAccess||isSectionLocked;
  const hasSign=value&&value!=='NA_BYPASSED'&&value!=='';

  useEffect(()=>{
    if(!isOpen) return;
    const t=setTimeout(()=>{
      const c=canvasRef.current; if(!c) return;
      const ctx=c.getContext('2d');
      ctx.strokeStyle="#1e3a8a";ctx.lineWidth=3.5;ctx.lineCap="round";ctx.lineJoin="round";
      if(value&&value!=='NA_BYPASSED'&&value!=='DONE'){
        const img=new Image(); img.onload=()=>{ctx.clearRect(0,0,c.width,c.height);ctx.drawImage(img,0,0);}; img.src=value;
      } else ctx.clearRect(0,0,c.width,c.height);
    },100);
    return()=>clearTimeout(t);
  },[isOpen,value]);

  const getCoords=(e,rect)=>{
    if(!rect) return{x:0,y:0};
    const cx=e.touches&&e.touches.length>0?e.touches[0].clientX:e.clientX;
    const cy=e.touches&&e.touches.length>0?e.touches[0].clientY:e.clientY;
    return{x:cx-rect.left,y:cy-rect.top};
  };
  const startDraw=e=>{
    if(locked) return;
    const c=canvasRef.current; if(!c) return;
    rectCache.current=c.getBoundingClientRect();
    lastPos.current=getCoords(e,rectCache.current); setIsDrawing(true);
    if(navigator.vibrate) navigator.vibrate(15);
  };
  const draw=e=>{
    if(!isDrawing||locked) return;
    if(e.cancelable) e.preventDefault();
    const c=canvasRef.current; const ctx=c.getContext('2d');
    if(!rectCache.current) rectCache.current=c.getBoundingClientRect();
    const pos=getCoords(e,rectCache.current);
    ctx.beginPath();ctx.moveTo(lastPos.current.x,lastPos.current.y);ctx.lineTo(pos.x,pos.y);ctx.stroke();
    lastPos.current=pos;
  };
  const stopDraw=()=>{if(isDrawing&&!locked) setIsDrawing(false);};
  const handleSave=()=>{
    if(locked) return;
    onChange(canvasRef.current.toDataURL('image/png',0.5));
    setIsOpen(false);
    if(navigator.vibrate) navigator.vibrate(80);
  };

  return(
    <div className={`border rounded-xl p-3 my-2 shadow-sm ${isSectionLocked?'border-red-200 bg-red-50/10':noAccess?'border-amber-200 bg-amber-50/10':'border-gray-300 bg-white'}`}>
      <div className="flex justify-between items-center mb-2">
        <label className="font-extrabold text-xs text-gray-700 tracking-wide uppercase flex items-center gap-1">
          {isSectionLocked&&<span className="text-red-600">🔒</span>}
          {noAccess&&!isSectionLocked&&<span className="text-amber-500">🚫</span>}
          {title}
        </label>
        {hasSign&&!locked&&(
          <button type="button" onClick={onClearAttempt} className="text-[10px] bg-red-100 text-red-600 hover:bg-red-200 px-3 py-1 rounded-lg font-bold">
            Clear (Admin)
          </button>
        )}
      </div>
      {noAccess&&!isSectionLocked?(
        <div className="h-10 flex items-center justify-center text-[10px] text-amber-600 font-bold bg-amber-50 border border-amber-200 rounded-lg">
          🚫 Signature access restricted to section owner
        </div>
      ):hasSign?(
        <div className="flex flex-col items-center p-2.5 border rounded-lg bg-gray-50 shadow-inner">
          {value==='DONE'?(
            <div className="h-16 flex flex-col items-center justify-center text-blue-900 font-extrabold text-xs uppercase tracking-wide bg-blue-50 border border-blue-200 w-full rounded-lg">
              <span className="text-lg">✓</span><span>DIGITAL SIGN VERIFIED</span><span className="text-[9px] text-blue-500">(DONE)</span>
            </div>
          ):(
            <img src={value} alt="Signature" className="h-16 object-contain"/>
          )}
          {!locked&&(
            <button type="button" onClick={()=>setIsOpen(true)} className="mt-2 text-xs bg-blue-100 hover:bg-blue-200 text-blue-700 font-bold py-1 px-3 rounded-lg">
              🔄 RE-SIGN
            </button>
          )}
          <p className="text-green-600 text-[10px] mt-1 font-bold">✓ Signed & Section Locked 🔒</p>
        </div>
      ):(
        <button type="button" disabled={locked} onClick={()=>setIsOpen(true)}
          className="w-full py-4 border-2 border-dashed border-blue-300 bg-blue-50/20 text-blue-700 hover:bg-blue-50/40 rounded-xl font-black text-xs flex items-center justify-center gap-2 active:scale-98 disabled:opacity-40 disabled:cursor-not-allowed">
          📝 CLICK TO SIGN / हस्ताक्षर करें
        </button>
      )}
      {isOpen&&(
        <div className="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-[100] p-4">
          <div className="bg-white p-4 rounded-2xl shadow-2xl w-full max-w-sm border border-gray-300">
            <h3 className="font-extrabold text-sm text-gray-800 mb-3 uppercase text-center">{title}</h3>
            <p className="text-[10px] text-gray-500 mb-2 text-center">उंगली से नीचे BOX में हस्ताक्षर करें:</p>
            <canvas ref={canvasRef} width={340} height={150}
              className="signature-canvas border-2 border-dashed border-blue-200 bg-blue-50/10 w-full rounded-xl cursor-crosshair shadow-inner"
              style={{touchAction:'none'}}
              onMouseDown={startDraw} onMouseMove={draw} onMouseUp={stopDraw} onMouseLeave={stopDraw}
              onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={stopDraw}/>
            <div className="flex gap-2.5 mt-4">
              <button type="button" onClick={()=>setIsOpen(false)} className="flex-1 bg-gray-200 text-gray-800 font-bold py-2 rounded-xl text-xs">Cancel</button>
              <button type="button" onClick={()=>{const c=canvasRef.current;if(c)c.getContext('2d').clearRect(0,0,c.width,c.height);}} className="flex-1 bg-yellow-100 text-yellow-800 font-bold py-2 rounded-xl text-xs">Clear Box</button>
              <button type="button" onClick={handleSave} className="flex-1 bg-blue-600 text-white font-bold py-2 rounded-xl text-xs shadow-md">Save Sign</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ── Main App ─────────────────────────────────────────────────────────────────
function App(){
  // Auth
  const [currentUser,setCurrentUser]=useState(null);
  const [loginUser,setLoginUser]=useState('');
  const [loginPass,setLoginPass]=useState('');
  const [loginLoading,setLoginLoading]=useState(false);
  const [loginError,setLoginError]=useState('');
  // Navigation
  const [splash,setSplash]=useState(true);
  const [appMode,setAppMode]=useState('menu');
  // Form
  const [sampleNoInput,setSampleNoInput]=useState('');
  const [activeSampleId,setActiveSampleId]=useState(null);
  const [formData,setFormData]=useState(initialFormState);
  const [status,setStatus]=useState('System Ready');
  const [cloudSyncing,setCloudSyncing]=useState(false);
  const [submitting,setSubmitting]=useState(false);
  const [samplesList,setSamplesList]=useState([]);
  const [fetchingForm,setFetchingForm]=useState(false);
  const [isOnline,setIsOnline]=useState(navigator.onLine);
  // Admin modal (replaces @0017)
  const [showAdminModal,setShowAdminModal]=useState(false);
  const [adminAction,setAdminAction]=useState('');
  const [adminTarget,setAdminTarget]=useState('');
  const [adminPass,setAdminPass]=useState('');
  const [adminPassErr,setAdminPassErr]=useState('');
  // Notification
  const [notif,setNotif]=useState({show:false,msg:'',type:'info'});
  const showAlert=(msg,type='info')=>setNotif({show:true,msg,type});
  const closeAlert=()=>setNotif({show:false,msg:'',type:'info'});

  // Splash
  useEffect(()=>{const t=setTimeout(()=>setSplash(false),2000);return()=>clearTimeout(t);},[]);

  // Online status
  useEffect(()=>{
    const on=()=>setIsOnline(true);const off=()=>setIsOnline(false);
    window.addEventListener('online',on);window.addEventListener('offline',off);
    return()=>{window.removeEventListener('online',on);window.removeEventListener('offline',off);};
  },[]);

  // Restore session
  useEffect(()=>{
    const s=localStorage.getItem('sarv_session');
    if(s){try{setCurrentUser(JSON.parse(s));}catch(e){}}
  },[]);

  // Prevent accidental close during form
  useEffect(()=>{
    const h=e=>{if(appMode==='form'&&activeSampleId){e.preventDefault();e.returnValue="";}};
    window.addEventListener('beforeunload',h);return()=>window.removeEventListener('beforeunload',h);
  },[appMode,activeSampleId]);

  // Auto-save to localStorage
  useEffect(()=>{
    if(!activeSampleId) return;
    const t=setTimeout(()=>{
      localStorage.setItem(`sarv_sample_${activeSampleId}`,JSON.stringify(formData));
      const l=JSON.parse(localStorage.getItem('sarv_samples_list')||'[]');
      if(!l.includes(activeSampleId)){l.push(activeSampleId);localStorage.setItem('sarv_samples_list',JSON.stringify(l));}
    },1000);
    return()=>clearTimeout(t);
  },[formData,activeSampleId]);

  // Section lock states (based on signatures present)
  const isWeavingLocked=!!formData.sign_weavingRaschelMaster;
  const isSlittingLocked=!!formData.sign_slittingRaschelMaster;
  const isStenter1Locked=!!formData.sign_stenterMaster1&&formData.stenterYesNo==='YES';
  const isGreyPolishLocked=!!formData.sign_greyPolishMaster;
  const isPrintingLocked=!!formData.sign_printingMaster;
  const isStenter2Locked=!!formData.sign_stenterMaster2||formData.dryerProcess==='DRYER';
  const isFinishingLocked=!!formData.sign_finishingMaster;
  const isPackingLocked=!!formData.sign_packingContractor;

  // Pending signatures for submit check
  const getPendingSigs=()=>{
    const sigs={sign_weavingRaschelMaster:"Raschel Master (Weaving)",sign_slittingRaschelMaster:"Slitting Master",sign_stenterMaster1:"Stenter Master 1",sign_greyPolishMaster:"Grey Polish Master",sign_printingMaster:"Printing Master",sign_stenterMaster2:"Stenter Master 2",sign_finishingMaster:"Finishing Master",sign_packingContractor:"Packing Contractor",sign_checkedRaschel:"QC: Raschel",sign_checkedGreyPolish:"QC: Grey Polish",sign_checkedPrinting:"QC: Printing",sign_checkedFinishing:"QC: Finishing",sign_checkedGM:"QC: GM",sign_approvedMD:"MD Approval"};
    return Object.keys(sigs).filter(k=>{
      if(k==='sign_stenterMaster2'&&formData.dryerProcess==='DRYER') return false;
      if(k==='sign_stenterMaster1'&&formData.stenterYesNo==='NO') return false;
      const v=formData[k]; return !v||v===''||v==='NA_BYPASSED';
    }).map(k=>({key:k,name:sigs[k]}));
  };
  const pendingSigs=getPendingSigs();
  const allSigsDone=pendingSigs.length===0;

  // Field permission helper
  const fe=(field)=>!canEditField(currentUser?.role,field); // fe = field externally locked

  // getVal for PDF
  const getVal=(f)=>(formData[f]!==undefined&&formData[f]!==null&&String(formData[f]).trim()!=='')?formData[f]:'NA';

  // ── UPDATE FIELD ────────────────────────────────────────────────────────────
  const updateField=(field,value)=>{
    if(!canEditField(currentUser?.role,field)) return;
    setFormData(prev=>{
      const next={...prev,[field]:value};
      const autoSync=['sign_','dryerProcess','stenterYesNo','polishBeforeBrushingYesNo','highSpeedBrushingYesNo','finishHighSpeedBrushingYesNo','finishPolishBeforeBrushingYesNo','raisingYesNo','embossYesNo','bedSize','blanketPly','sampleApprovedYesNo'];
      if(autoSync.some(p=>field.startsWith(p)||field===p)) triggerSync(next);
      return next;
    });
  };

  // ── CLOUD SYNC ──────────────────────────────────────────────────────────────
  const triggerSync=async(data=formData)=>{
    if(!activeSampleId||!data.sampleNo) return;
    const del=JSON.parse(localStorage.getItem('sarv_deleted_samples')||'[]');
    if(del.map(i=>String(i).toUpperCase()).includes(String(activeSampleId).toUpperCase())) return;
    if(!isOnline){setStatus('Offline — saved to device memory.');return;}
    setCloudSyncing(true);setStatus('Syncing to Google Sheets...');
    try{
      await fetch(GOOGLE_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({...data,username:currentUser?.username||''})});
      setStatus('✅ Synced to Sheet!');
    }catch(e){setStatus('Sync error. Will retry.');}
    finally{setCloudSyncing(false);}
  };

  // ── LOGIN ───────────────────────────────────────────────────────────────────
  const handleLogin=async()=>{
    if(!loginUser.trim()||!loginPass.trim()){setLoginError("Username aur password dono daalen.");return;}
    setLoginLoading(true);setLoginError('');
    try{
      const res=await fetch(`${GOOGLE_SCRIPT_URL}?action=login&user=${encodeURIComponent(loginUser.trim())}&pass=${encodeURIComponent(loginPass.trim())}`);
      const d=await res.json();
      if(d.valid){
        const u={username:d.username,role:d.role,displayName:d.displayName,allowedFields:d.allowedFields};
        setCurrentUser(u);localStorage.setItem('sarv_session',JSON.stringify(u));
        setLoginUser('');setLoginPass('');
      }else{setLoginError(d.reason||"Invalid credentials.");}
    }catch(e){setLoginError("Server se connect nahi ho pa raha.");}
    finally{setLoginLoading(false);}
  };

  const handleLogout=()=>{
    setCurrentUser(null);localStorage.removeItem('sarv_session');
    setAppMode('menu');setActiveSampleId(null);setFormData(initialFormState);
  };

  // ── FETCH SAMPLE FROM SHEET ──────────────────────────────────────────────────
  const loadSample=async(id)=>{
    setFetchingForm(true);setStatus('Fetching from Google Sheet...');
    let loaded=false;
    if(isOnline){
      try{
        const res=await fetch(`${GOOGLE_SCRIPT_URL}?action=getSample&sampleNo=${encodeURIComponent(id)}`);
        const d=await res.json();
        if(d&&d.sampleNo&&!d.error){
          const merged={...initialFormState,...d};
          setFormData(merged);localStorage.setItem(`sarv_sample_${id}`,JSON.stringify(merged));
          setStatus('✅ Live data loaded from Sheet!');loaded=true;
        }
      }catch(e){console.error(e);}
    }
    if(!loaded){
      const s=localStorage.getItem(`sarv_sample_${id}`);
      if(s){setFormData({...initialFormState,...JSON.parse(s)});setStatus('📱 Loaded from device (offline).');}
      else{setFormData({...initialFormState,sampleNo:id,isSubmitted:false});setStatus('New sample form ready.');}
    }
    setFetchingForm(false);
  };

  // ── FETCH SAMPLE DIRECTORY ───────────────────────────────────────────────────
  const fetchDirectory=async(type)=>{
    setStatus('Loading directory...');
    const del=JSON.parse(localStorage.getItem('sarv_deleted_samples')||'[]').map(i=>String(i).toUpperCase());
    let cloud=[];let cloudOk=false;
    if(isOnline){try{const r=await fetch(GOOGLE_SCRIPT_URL+"?action=getSamples");cloud=await r.json();if(Array.isArray(cloud))cloudOk=true;}catch(e){}}
    let merged=[];
    if(cloudOk){
      cloud.forEach(ci=>{
        if(del.includes(String(ci.sampleNo).toUpperCase())) return;
        const loc=JSON.parse(localStorage.getItem(`sarv_sample_${ci.sampleNo}`)||'{}');
        merged.push({...ci,...loc});
      });
      setStatus('✅ Directory from cloud.');
    }else{
      const l=JSON.parse(localStorage.getItem('sarv_samples_list')||'[]');
      l.forEach(id=>{
        if(del.includes(String(id).toUpperCase())) return;
        const d=JSON.parse(localStorage.getItem(`sarv_sample_${id}`)||'{}');
        if(d.sampleNo) merged.push(d);
      });
      setStatus('📱 Offline directory.');
    }
    const f=merged.filter(i=>{const s=i.isSubmitted===true||i.isSubmitted==='true'||i.isSubmitted==='TRUE';return type==='submitted'?s:!s;});
    setSamplesList(f);
  };

  // ── NEW SAMPLE (ADMIN ONLY) ──────────────────────────────────────────────────
  const handleNewSample=async()=>{
    const id=sampleNoInput.trim().toUpperCase();
    if(!id){showAlert("Sample No enter karein!","warning");return;}
    if(currentUser?.role!=='ADMIN'){showAlert("Only Admin can create new samples.","warning");return;}
    const del=JSON.parse(localStorage.getItem('sarv_deleted_samples')||'[]').map(i=>String(i).toUpperCase());
    const loc=JSON.parse(localStorage.getItem('sarv_samples_list')||'[]').map(i=>String(i).toUpperCase());
    if(loc.includes(id)&&!del.includes(id)){showAlert(`${id} already exists! Resume se kholo.`,"warning");return;}
    setActiveSampleId(id);await loadSample(id);setAppMode('form');
  };

  // ── ADMIN MODAL ──────────────────────────────────────────────────────────────
  const openAdminModal=(action,target='')=>{
    setAdminAction(action);setAdminTarget(target);setAdminPass('');setAdminPassErr('');setShowAdminModal(true);
  };
  const handleAdminVerify=async()=>{
    if(!adminPass.trim()){setAdminPassErr("Password daalen.");return;}
    try{
      const res=await fetch(`${GOOGLE_SCRIPT_URL}?action=login&user=admin&pass=${encodeURIComponent(adminPass.trim())}`);
      const d=await res.json();
      if(d.valid&&d.role==='ADMIN'){
        setShowAdminModal(false);
        if(adminAction==='clear_sig'){
          setFormData(prev=>{const n={...prev,[adminTarget]:''};triggerSync(n);return n;});
          setStatus('Signature cleared by Admin.');
        }else if(adminAction==='delete'){
          doDelete(adminTarget);
        }else if(adminAction==='final_submit'){
          doFinalSubmit();
        }
      }else{setAdminPassErr("Admin password galat hai!");}
    }catch(e){setAdminPassErr("Server error.");}
  };

  // ── DELETE ───────────────────────────────────────────────────────────────────
  const doDelete=(id)=>{
    const up=String(id).toUpperCase();
    localStorage.removeItem(`sarv_sample_${up}`);localStorage.removeItem(`sarv_sample_${id}`);
    const l=JSON.parse(localStorage.getItem('sarv_samples_list')||'[]');
    localStorage.setItem('sarv_samples_list',JSON.stringify(l.filter(i=>String(i).toUpperCase()!==up)));
    const d=JSON.parse(localStorage.getItem('sarv_deleted_samples')||'[]');
    if(!d.map(i=>String(i).toUpperCase()).includes(up)){d.push(up);localStorage.setItem('sarv_deleted_samples',JSON.stringify(d));}
    setSamplesList(prev=>prev.filter(i=>String(i.sampleNo).toUpperCase()!==up));
    showAlert(`Sample ${id} deleted.`,"success");
    if(isOnline) fetch(GOOGLE_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'delete',sampleNo:up})}).catch(()=>{});
  };

  // ── PHOTO UPLOAD ─────────────────────────────────────────────────────────────
  const handlePhoto=(e)=>{
    const f=e.target.files[0];if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement('canvas');const W=500;const sc=W/img.width;
        c.width=W;c.height=img.height*sc;c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        updateField('printingDesignPhoto',c.toDataURL('image/jpeg',0.65));
      };img.src=ev.target.result;
    };r.readAsDataURL(f);
  };

  // ── CSV EXPORT ───────────────────────────────────────────────────────────────
  const exportCSV=()=>{
    const h=Object.keys(formData).filter(k=>!k.startsWith('sign_')&&k!=='printingDesignPhoto');
    const row=h.map(k=>{const v=formData[k];return(v===''||v==null)?'NA':`"${v}"`;});
    const uri="data:text/csv;charset=utf-8,"+h.join(",")+"\n"+row.join(",");
    const a=document.createElement("a");a.setAttribute("href",encodeURI(uri));a.setAttribute("download",`Sample_${activeSampleId}.csv`);
    document.body.appendChild(a);a.click();document.body.removeChild(a);
  };

  // ── FINAL SUBMIT (ADMIN ONLY) ────────────────────────────────────────────────
  const doFinalSubmit=()=>{
    setSubmitting(true);setStatus('Compiling PDF...');
    const final={...formData,isSubmitted:true};setFormData(final);
    setTimeout(async()=>{
      try{
        const wrap=document.getElementById('printable-multipage-area');wrap.style.display='block';
        const pdf=new jspdf.jsPDF('p','mm','a4');
        const pw=pdf.internal.pageSize.getWidth();const ph=pdf.internal.pageSize.getHeight();
        const c1=await html2canvas(document.getElementById('pdf-page-1'),{scale:1.5,useCORS:true,logging:false});
        pdf.addImage(c1.toDataURL('image/jpeg',0.75),'JPEG',0,0,pw,ph);
        pdf.addPage();
        const c2=await html2canvas(document.getElementById('pdf-page-2'),{scale:1.5,useCORS:true,logging:false});
        pdf.addImage(c2.toDataURL('image/jpeg',0.75),'JPEG',0,0,pw,ph);
        pdf.save(`Sample_Lot_${formData.sampleNo}.pdf`);
        wrap.style.display='none';
        const b64=pdf.output('datauristring').split(',')[1];
        const payload={...final,isSubmitted:true,pdfBlobBase64:b64,action:'finalSubmit'};
        let driveUrl="";
        if(isOnline){
          try{const r=await fetch(GOOGLE_SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)});if(r.ok){const rj=await r.json();if(rj.status==='success')driveUrl=rj.fileUrl||"";}}
          catch(fe){await fetch(GOOGLE_SCRIPT_URL,{method:'POST',mode:'no-cors',body:JSON.stringify(payload)});}
        }
        const local={...final,pdfDriveUrl:driveUrl||"Saved in Sarv India PDF Lots Folder"};
        setFormData(local);localStorage.setItem(`sarv_sample_${activeSampleId}`,JSON.stringify(local));
        setStatus('✅ Submitted! Sheet & Drive updated.');
        showAlert("✅ PDF downloaded & data saved to Google Sheet!","success");
        setAppMode('menu');
      }catch(e){console.error(e);setStatus('Error during submit.');showAlert("Error during submit. Try again.","warning");}
      finally{setSubmitting(false);}
    },500);
  };

  const clearCache=()=>{
    localStorage.removeItem('sarv_samples_list');localStorage.removeItem('sarv_deleted_samples');
    for(let i=localStorage.length-1;i>=0;i--){const k=localStorage.key(i);if(k&&k.startsWith('sarv_sample_'))localStorage.removeItem(k);}
    fetchDirectory(appMode==='submitted-list'?'submitted':'incomplete');
    showAlert("Cache cleared! Fresh sync se data load hoga.","success");

          <div className="text-4xl mb-2">🏭</div>
          <h1 className="text-xl font-black text-blue-900">SARV INDIA</h1>

          </button>
        </div>
        <div className="mt-5 pt-4 border-t text-center">
          <span className={`inline-flex items-center gap-1.5 text-[10px] font-bold ${isOnline?'text-green-600':'text-red-500'}`}>
            <span className={`w-2 h-2 rounded-full ${isOnline?'bg-green-500':'bg-red-500'} pulse-sync-active`}></span>
            {isOnline?"Server Connected":"Offline Mode"}
          </span>
        </div>
      </div>

  // MENU
  if(appMode==='menu') return(

          <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Mobile Sample System</p>

        <div className={`mt-3 mb-5 px-3 py-2.5 rounded-xl text-white text-center ${ROLE_COLORS[currentUser.role]||'bg-gray-700'}`}>
          <p className="text-[10px] font-bold opacity-80 uppercase">Logged in as</p>

          <p className="text-[10px] opacity-70">{ROLE_LABELS[currentUser.role]||currentUser.role}</p>

              <div className="flex items-center text-left">
                <span className="text-xl mr-2.5">➕</span>
                <div><p className="text-xs font-bold">1. NEW SAMPLE ENTRY</p><p className="text-[9px] text-blue-200">Start new production lot</p></div>
              </div><span>➔</span>
            </button>
          )}
          <button onClick={()=>{setAppMode('resume-list');fetchDirectory('incomplete');}}
            className="w-full flex items-center justify-between bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-3.5 px-5 rounded-xl shadow active:scale-95">
            <div className="flex items-center text-left">
              <span className="text-xl mr-2.5">📂</span>
              <div><p className="text-xs font-bold">OPEN ACTIVE LOTS</p><p className="text-[9px] text-yellow-100">Fetch & fill your section</p></div>
            </div><span>➔</span>
          </button>
          <button onClick={()=>{setAppMode('submitted-list');fetchDirectory('submitted');}}
            className="w-full flex items-center justify-between bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 px-5 rounded-xl shadow active:scale-95">
            <div className="flex items-center text-left">
              <span className="text-xl mr-2.5">📋</span>
              <div><p className="text-xs font-bold">VIEW SUBMITTED LOTS</p><p className="text-[9px] text-emerald-100">Review finalized records</p></div>
            </div><span>➔</span>
          </button>
        </div>
        <div className="mt-5 pt-4 border-t flex items-center justify-between">
          <span className={`flex items-center gap-1.5 text-[10px] font-bold ${isOnline?'text-green-600':'text-red-500'}`}>
            <span className={`w-2 h-2 rounded-full ${isOnline?'bg-green-500':'bg-red-500'} pulse-sync-active`}></span>
            {isOnline?"Online":"Offline"}

          <button onClick={handleLogout} className="text-[10px] font-bold text-red-500 bg-red-50 px-3 py-1.5 rounded-lg">🚪 Logout</button>
        </div>
      </div>
    </div>
  );

  // NEW SAMPLE (admin only)
  if(appMode==='new') return(

        <button onClick={handleNewSample} className="w-full bg-blue-600 text-white font-bold py-3 rounded-lg mt-4 text-xs tracking-wider active:scale-95">

  if(appMode==='resume-list'||appMode==='submitted-list'){

      <div className="min-h-screen bg-gray-50 pb-12 w-full">

            </div>
            {formData.sign_finishingMaster&&formData.sign_finishingMaster!=='NA_BYPASSED'&&(<div style={{display:'flex',borderTop:'1px solid #e2e8f0',backgroundColor:'#f8fafc',padding:'3px 8px',justifyContent:'flex-end'}}><div style={{textAlign:'center',fontSize:'7px'}}>{formData.sign_finishingMaster==='DONE'?<div style={{fontSize:'8px',fontWeight:'bold',color:'#059669',padding:'4px'}}>✓ VERIFIED (DONE)</div>:<img src={formData.sign_finishingMaster} alt="sign" style={{height:'26px',objectFit:'contain',margin:'0 auto'}}/>}<div style={{borderTop:'1px solid #94a3b8',fontWeight:'bold',color:'#059669'}}>FINISHING MASTER</div></div></div>)}
          </div>
          <div style={{border:'1px solid #059669',borderRadius:'5px',overflow:'hidden',marginBottom:'12px'}}>
            <div style={{backgroundColor:'#059669',color:'#fff',padding:'4px 8px',fontSize:'10px',fontWeight:'bold',textTransform:'uppercase'}}>7. PACKING PROCESS DATA BY PACKING CONTRACTOR</div>
            <div style={{padding:'6px',display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'4px 8px',fontSize:'9px'}}>
              <div><strong>Total Pcs:</strong> {getVal('totalPcs')}</div><div><strong>Avg Length:</strong> {getVal('averagePcsLength')}</div>
              <div><strong>Avg Width:</strong> {getVal('averagePcsWidth')}</div><div><strong>Avg Weight:</strong> {getVal('avgPcsWeight')}</div>
              <div style={{gridColumn:'span 2'}}><strong>Waste Weight:</strong> {getVal('totalWasteWeight')}</div>
              <div style={{gridColumn:'span 2'}}><strong>Label:</strong> {getVal('label')}</div>
            </div>
            {formData.sign_packingContractor&&formData.sign_packingContractor!=='NA_BYPASSED'&&(<div style={{display:'flex',borderTop:'1px solid #e2e8f0',backgroundColor:'#f8fafc',padding:'3px 8px',justifyContent:'flex-end'}}><div style={{textAlign:'center',fontSize:'7px'}}>{formData.sign_packingContractor==='DONE'?<div style={{fontSize:'8px',fontWeight:'bold',color:'#059669',padding:'4px'}}>✓ VERIFIED (DONE)</div>:<img src={formData.sign_packingContractor} alt="sign" style={{height:'26px',objectFit:'contain',margin:'0 auto'}}/>}<div style={{borderTop:'1px solid #94a3b8',fontWeight:'bold',color:'#059669'}}>PACKING CONTRACTOR</div></div></div>)}
          </div>
          <div style={{border:'2px solid #047857',borderRadius:'6px',overflow:'hidden',backgroundColor:'#fff'}}>
            <div style={{backgroundColor:'#047857',color:'#fff',padding:'4px 8px',fontSize:'10px',fontWeight:'bold',textTransform:'uppercase'}}>8. QUALITY VERIFICATION CHECKS & FINAL DIRECTOR APPROVAL</div>
            <div style={{padding:'6px 6px 3px 6px',display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:'6px'}}>
              {[{k:'sign_checkedRaschel',l:'RASCHEL CHECK'},{k:'sign_checkedGreyPolish',l:'GREY POLISH'},{k:'sign_checkedPrinting',l:'PRINTING CHECK'},{k:'sign_checkedFinishing',l:'FINISHING CHECK'},{k:'sign_checkedGM',l:'GM VERIFIED'}].map(({k,l})=>(
                <div key={k} style={{border:'1px solid #e2e8f0',borderRadius:'3px',padding:'3px',textAlign:'center'}}>
                  {formData[k]&&formData[k]!=='NA_BYPASSED'?(formData[k]==='DONE'?<div style={{fontSize:'6px',color:'#047857',fontWeight:'bold'}}>VERIFIED</div>:<img src={formData[k]} alt={l} style={{height:'26px',objectFit:'contain',margin:'0 auto'}}/>):<div style={{height:'26px',lineHeight:'26px',fontSize:'6px',color:'#94a3b8'}}>Unsigned</div>}
                  <p style={{fontSize:'6px',fontWeight:'bold',borderTop:'1px solid #f1f5f9',marginTop:'2px',paddingTop:'2px',textTransform:'uppercase'}}>{l}</p>
                </div>
              ))}
            </div>
            <div style={{borderTop:'1px solid #047857',display:'flex',justifyContent:'space-between',alignItems:'center',backgroundColor:'#f0fdf4',padding:'6px 12px'}}>
              <div style={{fontSize:'9px'}}><strong>SAMPLE APPROVED BY MD:</strong> <span style={{color:'#047857',fontWeight:'bold'}}>{getVal('sampleApprovedYesNo')}</span></div>
              {formData.sign_approvedMD&&formData.sign_approvedMD!=='NA_BYPASSED'&&(<div style={{textAlign:'center',fontSize:'7px'}}>{formData.sign_approvedMD==='DONE'?<div style={{fontSize:'8px',fontWeight:'bold',color:'#047857',padding:'4px'}}>✓ VERIFIED (DONE)</div>:<img src={formData.sign_approvedMD} alt="MD sign" style={{height:'30px',objectFit:'contain',margin:'0 auto'}}/>}<div style={{borderTop:'1px solid #047857',fontWeight:'bold',color:'#047857'}}>MANAGING DIRECTOR (MD)</div></div>)}
            </div>
          </div>
          <div style={{position:'absolute',bottom:'15px',left:'30px',right:'30px',display:'flex',justifyContent:'space-between',borderTop:'1px solid #e2e8f0',paddingTop:'6px',fontSize:'8px',color:'#94a3b8',fontWeight:'bold'}}>
            <span>SARV INDIA HOME FURNISHING - SAMPLE NO: {getVal('sampleNo')}</span><span>Page 2 of 2</span>
          </div>
        </div>
      </div>

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
